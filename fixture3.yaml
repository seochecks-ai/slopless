    fixtures:
      - "behavior/fixtures/textlint-rules/cases/academic-slop/*.md"
    command: &textlint_command
      argv:
        - "scripts/behavior-replay.sh"
        - "{fixtures}"
      ok_exit_codes:
        - 0
        - 1
    storage:
      approved_dir: "behavior/golden/textlint-rules-cases-academic-slop"
      received_dir: ".fixture3/textlint-rules-cases-academic-slop"
